<!DOCTYPE html>
<html>
<head>
<title>Tech News</title>

<style>
body{
font-family: Arial;
margin:40px;
}

h1{
margin-bottom:10px;
}

.topics button{
padding:5px 10px;
margin-right:5px;
border:1px solid gray;
background:#eee;
cursor:pointer;
}

.news-item{
padding:10px 0;
border-bottom:1px solid #ccc;
}

.news-item a{
display:block;
margin-top:5px;
color:blue;
}
</style>

</head>

<body>

<h1>Tech News</h1>

<div class="topics">
<button onclick="getNews('ai')">AI</button>
<button onclick="getNews('javascript')">Javascript</button>
<button onclick="getNews('startup')">Startup</button>
<button onclick="getNews('programming')">Programming</button>
</div>

<div id="news"></div>

<script>
const newsDiv = document.getElementById("news")

async function getNews(topic="startup"){

const res = await fetch(`https://hn.algolia.com/api/v1/search?query=${topic}`)
const data = await res.json()

newsDiv.innerHTML=""

data.hits.slice(0,10).forEach(news=>{

newsDiv.innerHTML += `
<div class="news-item">
<p>${news.title}</p>
<button onclick="readNews('${news.url}','${news.objectID}')">Read</button>
</div>
`

})

}

function readNews(url,id){

alert("Opening article...")

if(url){
window.open(url,"_blank")
}else{
window.open(`https://news.ycombinator.com/item?id=${id}`,"_blank")
}

}

getNews()
</script>

</body>
</html>
